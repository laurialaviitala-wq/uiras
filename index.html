  "11-01":9.1,"11-15":7.2,"11-30":5.3,"12-01":5.0,"12-15":3.8,"12-31":3.1,
};

function getClimateNormal(dateStr) {
  const mmdd = dateStr.slice(5);
  const keys = Object.keys(CLIMATE_NORMALS).sort();
  let prev = keys[0], next = keys[keys.length-1];
  for (const k of keys) { if (k <= mmdd) prev = k; }
  for (const k of keys) { if (k >= mmdd) { next = k; break; } }
  if (prev === next) return CLIMATE_NORMALS[prev];
  const d1=new Date("2000-"+prev),d2=new Date("2000-"+next),d=new Date("2000-"+mmdd);
  return CLIMATE_NORMALS[prev]+((d-d1)/(d2-d1))*(CLIMATE_NORMALS[next]-CLIMATE_NORMALS[prev]);
}

function parseGeoJSON(json) {
  try {
    const props = json.type==="Feature" ? json.properties : json.features?.[0]?.properties;
    if (!props) return null;
    const clean = arr=>(arr||[]).filter(d=>d.temp_water!=null&&d.temp_water>-10&&d.temp_water<40).map(d=>({t:d.time.slice(0,10),w:d.temp_water}));
    const merged={};
    [...clean(props.data?.raw),...clean(props.data?.h3),...clean(props.data?.d1)].forEach(d=>{merged[d.t]=d;});
    const obs=Object.values(merged).sort((a,b)=>a.t.localeCompare(b.t));
    const latestRaw=clean(props.data?.raw).slice(-1)[0];
    const latestTemp=latestRaw?.w??props.measurement?.temp_water??null;
    const latestTime=(latestRaw?.t??(props.measurement?.time||"").slice(0,10))||null;
    return {obs,latestTemp,latestTime};
  } catch(e){return null;}
}

function parseWeatherJSON(j) {
  try {
    const d=j.daily;
    return d.time.map((date,i)=>({
      date,
      air:(d.temperature_2m_max[i]+d.temperature_2m_min[i])/2,
      wind:d.windspeed_10m_max[i]/3.6,
      windDir:d.winddirection_10m_dominant[i],
      sunshine:d.sunshine_duration[i]/3600,
      radiation:d.shortwave_radiation_sum[i],
    }));
  } catch(e){return null;}
}

function windDirLabel(deg) {
  if(deg==null)return"–";
  return ["P","KP","K","KE","E","LE","L","LP"][Math.round(deg/45)%8];
}

function buildSeason(obs){
  const m={};
  obs.forEach(d=>{const k=d.t.slice(5);if(!m[k])m[k]=[];m[k].push(d.w);});
  return m;
}

function windEffect(dir,speed){
  if(dir==null||speed==null)return 0;
  const diff=Math.abs(((dir-90+180)%360)-180);
  return Math.cos((diff*Math.PI)/180)*(Math.min(speed,15)/7.5)*0.2;
}
function radiationEffect(radMJ,month){
  if(radMJ==null)return 0;
  return(radMJ/20)*0.3*(month>=5&&month<=8?1:0.5);
}
function airEffect(air,waterTemp){
  if(air==null)return 0;
  return(air-(waterTemp||5))*0.08;
}

function buildForecast(obs,weather,today){
  const recent=obs.filter(d=>d.t<=today).slice(-5);
  if(!recent.length)return[];
  const lastVal=recent[recent.length-1].w, lastDate=recent[recent.length-1].t;
  const last10=obs.filter(d=>d.t<=today).slice(-10);
  const n=last10.length;
  let slope=0;
  if(n>=2){
    const xs=last10.map((_,i)=>i),ys=last10.map(d=>d.w);
    const xM=xs.reduce((a,b)=>a+b,0)/n,yM=ys.reduce((a,b)=>a+b,0)/n;
    const denom=xs.reduce((s,x)=>s+(x-xM)**2,0);
    if(denom)slope=xs.reduce((s,x,i)=>s+(x-xM)*(ys[i]-yM),0)/denom;
  }
  slope=Math.max(-0.3,Math.min(0.3,slope));
  const byDoy=buildSeason(obs);
  const result=[];
  for(let i=1;i<=61;i++){
    const d=new Date(lastDate+"T12:00:00Z");
    d.setDate(d.getDate()+i);
    const dateStr=d.toISOString().slice(0,10),key=dateStr.slice(5),month=d.getUTCMonth()+1;
    const hist=byDoy[key]||[],histAvg=hist.length?hist.reduce((a,b)=>a+b,0)/hist.length:null;
    const rajHist=RAJASAARI_SEASON[key]||[],rajAvg=rajHist.length?rajHist.reduce((a,b)=>a+b,0)/rajHist.length:null;
    const climNorm=getClimateNormal(dateStr);
    const seasonExp=histAvg!=null&&rajAvg!=null?histAvg*0.2+rajAvg*0.5+climNorm*0.3
                   :rajAvg!=null?rajAvg*0.6+climNorm*0.4
                   :histAvg!=null?histAvg*0.5+climNorm*0.5:climNorm;
    const wx=(weather||[]).find(w=>w.date===dateStr);
    const wxW=Math.max(0,1-(i-1)/16);
    const wEff=windEffect(wx?.windDir,wx?.wind)*wxW;
    const rEff=radiationEffect(wx?.radiation,month)*wxW;
    const aEff=airEffect(wx?.air,seasonExp)*wxW;
    const tW=Math.max(0,0.6-i*0.045);
    const base=(lastVal+slope*i)*tW+seasonExp*(1-tW);
    const forecast=Math.round(Math.max(0,base+wEff+rEff+aEff)*10)/10;
    result.push({date:dateStr,label:key,forecast,climNorm:Math.round(climNorm*10)/10,rajAvg:rajAvg?Math.round(rajAvg*10)/10:null,airTemp:wx?.air??null,sunshine:wx?.sunshine!=null?Math.round(wx.sunshine*10)/10:null,windDir:wx?.windDir??null,wind:wx?.wind??null,windEff:Math.round(wEff*100)/100});
  }
  return result;
}

function LeafletMap({sites,selected,onSelect,siteData}){
  const mapRef=useRef(null),leafletMap=useRef(null),markers=useRef({});
  const tempColor=t=>t==null?"#64748b":t<5?"#60a5fa":t<10?"#22c55e":t<15?"#facc15":"#f97316";
  const makeIcon=(temp,isSel)=>{
    const col=tempColor(temp),label=temp!=null?temp.toFixed(1)+"°":"?",size=isSel?44:36;
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${size/2-2}" fill="${col}" stroke="${isSel?"#fff":"#1e293b"}" stroke-width="${isSel?3:1.5}"/><text x="${size/2}" y="${size/2+4}" text-anchor="middle" font-size="${isSel?11:9}" font-weight="700" font-family="system-ui" fill="#fff">${label}</text></svg>`;
    return L.divIcon({html:svg,className:"",iconSize:[size,size],iconAnchor:[size/2,size/2]});
  };
  useEffect(()=>{
    if(leafletMap.current||!mapRef.current)return;
    const map=L.map(mapRef.current,{center:[60.19,24.98],zoom:11});
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:18}).addTo(map);
    leafletMap.current=map;
    sites.forEach(s=>{
      const d=siteData[s.id],temp=d?.obs?.slice(-1)[0]?.w??d?.latestTemp;
      const m=L.marker([s.lat,s.lon],{icon:makeIcon(temp,s.id===selected?.id)}).addTo(map).on("click",()=>onSelect(s));
      m.bindTooltip(s.name,{permanent:false,direction:"top"});
      markers.current[s.id]={marker:m};
    });
  },[]);
  useEffect(()=>{
    if(!leafletMap.current)return;
    sites.forEach(s=>{
      const e=markers.current[s.id];if(!e)return;
      const d=siteData[s.id],temp=d?.obs?.slice(-1)[0]?.w??d?.latestTemp;
      e.marker.setIcon(makeIcon(temp,s.id===selected?.id));
    });
    if(selected)leafletMap.current.panTo([selected.lat,selected.lon],{animate:true});
  },[selected,siteData]);
  return React.createElement("div",{style:{borderRadius:14,overflow:"hidden",border:"1px solid #1e3a4a",marginBottom:16}},
    React.createElement("div",{ref:mapRef,style:{height:280,width:"100%"}}),
    React.createElement("div",{style:{background:"#0d1f2d",padding:"6px 12px",borderTop:"1px solid #1e3a4a",display:"flex",gap:12,flexWrap:"wrap"}},

        React.createElement("span",{key:l,style:{fontSize:11,color:"#94a3b8",display:"flex",alignItems:"center",gap:4}},
          React.createElement("span",{style:{width:10,height:10,borderRadius:"50%",background:c,display:"inline-block"}}),l)
      )
    )
  );
}

        h("div",{style:{display:"flex",gap:8,marginTop:8}},
          btn("Lataa",handleWxPaste,{background:"#3b82f6",color:"#fff",border:"none",fontWeight:700}),
          btn("Peruuta",()=>{setWxPasteMode(false);setWxPasteText("");setWxPasteErr("");},{background:"#1e293b",color:"#94a3b8"})
        )
      ),

      h("div",{style:{display:"flex",gap:8,marginBottom:12}},
        ["map","list"].map(v=>btn(v==="map"?"🗺️ Kartta":"📋 Lista",()=>setView(v),{background:view===v?"#1e3a4a":"#1e293b",color:view===v?"#60a5fa":"#64748b",fontWeight:view===v?700:400}))
      ),

      view==="map"&&h(LeafletMap,{sites:SITES,selected,onSelect:handleSelect,siteData}),
      view==="list"&&h("div",{style:{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}},
        SITES.map(s=>{
          const d=siteData[s.id],temp=d?.obs?.slice(-1)[0]?.w??d?.latestTemp,active=s.id===selected.id;
          return btn(s.name+(temp!=null?" "+temp.toFixed(1)+"°":" –"),()=>handleSelect(s),{background:active?"#1e3a4a":"#1e293b",color:active?"#60a5fa":"#64748b",fontWeight:active?700:400,marginBottom:4});
        })
      ),

      h("div",{style:{background:"#0d1f2d",borderRadius:14,border:"1px solid #1e3a4a",padding:16,marginBottom:16}},
        h("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:12}},
          h("div",null,
            h("h2",{style:{margin:"0 0 2px",fontSize:18,fontWeight:800}},selected.name),
            h("p",{style:{margin:0,fontSize:11,color:"#475569"}},selected.lat.toFixed(4)+"°N "+selected.lon.toFixed(4)+"°E")
          ),
          h("div",{style:{display:"flex",gap:8}},
            btn(isLoading?"⏳ Ladataan...":"🌊 Päivitä vesidata",handleRefresh,{background:"#1e293b",color:"#60a5fa",opacity:isLoading?0.5:1}),
            btn("📋 Manuaalinen",()=>setPasteMode(p=>!p),{background:"#1e293b",color:"#64748b"})
          )
        ),

        pasteMode&&h("div",{style:{marginBottom:12}},
          h("p",{style:{color:"#94a3b8",fontSize:12,marginBottom:6}},"Avaa bri3.fvh.io/opendata/uiras/"+selected.id+".geojson, kopioi kaikki ja liitä alle."),
          h("textarea",{value:pasteText,onChange:e=>setPasteText(e.target.value),placeholder:"Liitä JSON...",rows:4,style:{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:8,color:"#f1f5f9",padding:10,fontSize:12,fontFamily:"monospace"}}),
          pasteError&&h("p",{style:{color:"#f87171",fontSize:12,marginTop:4}},pasteError),
          h("div",{style:{display:"flex",gap:8,marginTop:8}},
            btn("Lataa",handlePaste,{background:"#3b82f6",color:"#fff",border:"none",fontWeight:700}),
            btn("Peruuta",()=>{setPasteMode(false);setPasteError("");setPasteText("");},{background:"#1e293b",color:"#94a3b8"})
          )
        ),

        !data&&!isLoading&&h("div",{style:{background:"#1e293b",borderRadius:10,padding:16,textAlign:"center"}},
          h("p",{style:{color:"#94a3b8"}},"Ei dataa — klikkaa \"Päivitä vesidata\"")
        ),

        isLoading&&h("div",{style:{textAlign:"center",padding:"30px 0",color:"#64748b"}},h("p",null,"⏳ Haetaan dataa...")),

        data&&!isLoading&&h("div",null,
          h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:10,marginBottom:16}},
            [
              {label:"Vesi nyt",     val:latestT!=null?latestT.toFixed(1)+" °C":"–",        sub:data.latestTime||today,                    col:"#3b82f6"},
              {label:"Ilma tänään",  val:todayWx?todayWx.air.toFixed(1)+" °C":"–",          sub:"Open-Meteo",                              col:"#f97316"},
              {label:"Tuuli",        val:todayWx?todayWx.wind.toFixed(1)+" m/s":"–",         sub:todayWx?windDirLabel(todayWx.windDir)+" tuuli":"–",col:"#a78bfa"},
              {label:"+7 vrk vesi",  val:fc7?fc7.forecast.toFixed(1)+" °C":"–",             sub:"ennuste",                                 col:"#22c55e"},
              {label:"+14 vrk vesi", val:fc14?fc14.forecast.toFixed(1)+" °C":"–",           sub:"ennuste",                                 col:"#22c55e"},
              {label:"Uimakelp.",    val:swimmable>=0?"~"+swimmable+" pv":"ei pian",         sub:"≥15 °C",                                  col:swimmable>=0&&swimmable<30?"#facc15":"#64748b"},
            ].map((c,i)=>h("div",{key:i,style:{background:"#1e293b",borderRadius:10,padding:"10px 12px",borderTop:"3px solid "+c.col}},
              h("p",{style:{color:"#64748b",fontSize:10,margin:"0 0 3px",textTransform:"uppercase",letterSpacing:0.5}},c.label),
              h("p",{style:{color:c.col,fontSize:17,fontWeight:800,margin:"0 0 2px"}},c.val),
              h("p",{style:{color:"#475569",fontSize:10}},c.sub)
            ))
          ),

          h("div",{style:{background:"#0f172a",borderRadius:12,padding:"16px 8px 8px",marginBottom:12}},
            h("p",{style:{color:"#94a3b8",fontSize:12,fontWeight:600,margin:"0 0 2px 8px"}},"Viimeiset 10 pv + 61 vrk ennuste"),
            h("p",{style:{color:"#475569",fontSize:10,margin:"0 0 10px 8px"}},"🔵 Mitattu · 🟠 Ennuste · 🩵 Rajasaari 2024-25 · 🟣 Normaali 1991-2020"),
            h(ResponsiveContainer,{width:"100%",height:280},
              h(ComposedChart,{data:chartData,margin:{top:5,right:16,left:0,bottom:5}},
                h(CartesianGrid,{strokeDasharray:"3 3",stroke:"#1e293b"}),
                h(XAxis,{dataKey:"label",tick:{fill:"#64748b",fontSize:10},interval:Math.max(1,Math.floor(chartData.length/12))}),
                h(YAxis,{tick:{fill:"#64748b",fontSize:11},tickFormatter:v=>v+"°",domain:[0,"auto"]}),
                h(Tooltip,{content:h(TT,null)}),
                h(ReferenceLine,{x:today.slice(5),stroke:"#facc15",strokeDasharray:"4 2",label:{value:"tänään",fill:"#facc15",fontSize:9,position:"insideTopLeft"}}),
                h(ReferenceLine,{y:15,stroke:"#22c55e",strokeDasharray:"3 3",strokeOpacity:0.5,label:{value:"uimaraja",fill:"#22c55e",fontSize:9,position:"insideTopRight"}}),
                h(Line,{dataKey:"rajAvg",stroke:"#06b6d4",strokeWidth:1.5,strokeDasharray:"4 2",dot:false,name:"Rajasaari 24-25",connectNulls:true}),
                h(Line,{dataKey:"climNorm",stroke:"#a78bfa",strokeWidth:1.5,strokeDasharray:"4 2",dot:false,name:"Normaali 1991-2020",connectNulls:true}),
                h(Line,{dataKey:"obs",stroke:"#3b82f6",strokeWidth:2.5,dot:{r:3,fill:"#3b82f6"},name:"Mitattu",connectNulls:true}),
                h(Line,{dataKey:"forecast",stroke:"#f97316",strokeWidth:2,dot:false,name:"Ennuste",strokeDasharray:"5 4",connectNulls:true})
              )
            )
          ),

          forecastStrip.length>0&&h("div",{style:{overflowX:"auto"}},
            h("p",{style:{color:"#64748b",fontSize:10,margin:"0 0 6px"}},"Sääkaistale 14 pv — ilma = vrk keskiarvo"),
            h("div",{style:{display:"flex",gap:6,minWidth:"max-content"}},
              forecastStrip.map((f,i)=>{
                const wCol=f.windEff>0.1?"#22c55e":f.windEff<-0.1?"#f87171":"#94a3b8";
                return h("div",{key:i,style:{background:"#1e293b",borderRadius:8,padding:"8px 10px",textAlign:"center",minWidth:62}},
                  h("p",{style:{color:"#64748b",fontSize:9,margin:"0 0 3px"}},f.label),
                  h("p",{style:{color:"#f97316",fontSize:15,fontWeight:700,margin:"0 0 3px"}},f.forecast+"°"),
                  f.airTemp!=null&&h("p",{style:{color:"#94a3b8",fontSize:9,margin:"0 0 2px"}},"🌡 "+f.airTemp.toFixed(1)+"°"),
                  f.sunshine!=null&&h("p",{style:{color:"#facc15",fontSize:9,margin:"0 0 2px"}},"☀ "+f.sunshine.toFixed(0)+"h"),
                  f.wind!=null&&h("p",{style:{color:wCol,fontSize:9,margin:0}},"💨 "+windDirLabel(f.windDir)+" "+f.wind.toFixed(1)+" m/s")
                );
              })
            ),
            h("p",{style:{color:"#475569",fontSize:10,margin:"6px 0 0"}},"💨 Tuulen väri: 🟢 lämmin suunta · 🔴 kylmä (upwelling)")
          )
        )
      ),

      h("p",{style:{color:"#334155",fontSize:11,textAlign:"center"}},"Uiras: bri3.fvh.io · Sää: Open-Meteo · Kausiodotus: Rajasaari 2024-25 + IL normaali 1991-2020")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
